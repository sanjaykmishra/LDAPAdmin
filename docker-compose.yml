services:

  db:
    image: postgres:16-alpine
    container_name: ldap-admin-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ldapadmin}
      POSTGRES_USER:     ${POSTGRES_USER:-ldapadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ldapadmin}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ldapadmin} -d ${POSTGRES_DB:-ldapadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: elestio/pgadmin:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: mishra.sanjay@gmail.com
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-ldapadmin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ldap-admin-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DB_URL:      jdbc:postgresql://db:5432/${POSTGRES_DB:-ldapadmin}
      DB_USERNAME: ${POSTGRES_USER:-ldapadmin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ldapadmin}
      # Security — these MUST be supplied; no defaults for secrets
      ENCRYPTION_KEY:                  ${ENCRYPTION_KEY}
      JWT_SECRET:                      ${JWT_SECRET}
      # Bootstrap superadmin (only active when no permanent superadmin exists)
      BOOTSTRAP_SUPERADMIN_USERNAME:   ${BOOTSTRAP_SUPERADMIN_USERNAME:-superadmin}
      BOOTSTRAP_SUPERADMIN_PASSWORD:   ${BOOTSTRAP_SUPERADMIN_PASSWORD}
      # Logging
      LOG_LEVEL:     ${LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    ports:
      - "5173:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ldap-admin-frontend
    depends_on:
      - app
    ports:
      - "8080:8080"
    restart: unless-stopped

  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "My Company"
      LDAP_DOMAIN: "example.com"
      LDAP_BASE_DN: "dc=example,dc=com"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_PASSWORD: "readonly_password_456"
      LDAP_LOG_LEVEL: "256"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    restart: unless-stopped
    
volumes:
  pgdata:
  ldap_data:
  ldap_config:
  pgadmin_data:

